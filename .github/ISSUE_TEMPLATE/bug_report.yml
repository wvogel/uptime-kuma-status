name: Bug Report
description: Report a reproducible problem
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the admin
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git log -1 --oneline` or the commit hash from your deployment
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser (if frontend related)
      placeholder: Firefox 124, Chrome 130, ...
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant `docker compose logs` output
      render: shell
