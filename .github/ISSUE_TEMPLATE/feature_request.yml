name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How could the project address this? Alternatives you considered?
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: I have read the README and this feature isn't already covered
          required: true
        - label: I understand the project is opinionated and small features are preferred
          required: true
