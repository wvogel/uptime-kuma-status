<!DOCTYPE html>
<html lang="{{ default_lang | default('en') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ data.settings.get('page_title_' + (default_lang or 'en'), '') or t('title', default_lang or 'en') }}{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon-public.svg">
    <link rel="stylesheet" href="/static/style.css?v=6">
    {% block head %}{% endblock %}
</head>
<body>
    {% block body %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
