<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica Neue,Arial,sans-serif">
  <defs>
    <marker id="arrow-en" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#666" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-blue-en" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#007aff" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#f8f8fa" stroke="#d2d2d7" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1d1d1f">Architecture — Uptime Kuma Status</text>

  <!-- NPM / Reverse Proxy -->
  <rect x="30" y="60" width="840" height="44" rx="8" fill="#e8f4fd" stroke="#007aff" stroke-width="1"/>
  <text x="450" y="87" text-anchor="middle" font-size="13" font-weight="600" fill="#007aff">Nginx Proxy Manager (shared-npm)</text>

  <!-- Admin side -->
  <rect x="30" y="130" width="260" height="60" rx="8" fill="#fff" stroke="#d2d2d7" stroke-width="1"/>
  <text x="160" y="156" text-anchor="middle" font-size="12" font-weight="600" fill="#1d1d1f">oauth2-proxy</text>
  <text x="160" y="172" text-anchor="middle" font-size="10" fill="#6e6e73">Authentication</text>

  <!-- Arrow NPM -> oauth2-proxy -->
  <line x1="160" y1="104" x2="160" y2="130" stroke="#666" stroke-width="1.2" marker-end="url(#arrow-en)"/>

  <!-- Admin App -->
  <rect x="30" y="216" width="260" height="80" rx="8" fill="#fff3e0" stroke="#ff9f0a" stroke-width="1"/>
  <text x="160" y="244" text-anchor="middle" font-size="12" font-weight="600" fill="#1d1d1f">uptime-status-admin</text>
  <text x="160" y="260" text-anchor="middle" font-size="10" fill="#6e6e73">Admin GUI + API Fetcher</text>
  <text x="160" y="276" text-anchor="middle" font-size="10" fill="#6e6e73">writes to Valkey every 10s</text>

  <!-- Arrow oauth2-proxy -> admin -->
  <line x1="160" y1="190" x2="160" y2="216" stroke="#666" stroke-width="1.2" marker-end="url(#arrow-en)"/>

  <!-- Public side -->
  <rect x="350" y="130" width="260" height="60" rx="8" fill="#e8f9ee" stroke="#34c759" stroke-width="1"/>
  <text x="480" y="156" text-anchor="middle" font-size="12" font-weight="600" fill="#1d1d1f">uptime-status-public</text>
  <text x="480" y="172" text-anchor="middle" font-size="10" fill="#6e6e73">Public Status Page (read-only)</text>

  <!-- Arrow NPM -> public -->
  <line x1="480" y1="104" x2="480" y2="130" stroke="#666" stroke-width="1.2" marker-end="url(#arrow-en)"/>

  <!-- Valkey -->
  <rect x="190" y="330" width="220" height="56" rx="8" fill="#fde8e8" stroke="#ff3b30" stroke-width="1"/>
  <text x="300" y="354" text-anchor="middle" font-size="12" font-weight="600" fill="#1d1d1f">Valkey</text>
  <text x="300" y="370" text-anchor="middle" font-size="10" fill="#6e6e73">Monitor Cache (Redis-compatible)</text>

  <!-- Arrow admin -> Valkey -->
  <line x1="200" y1="296" x2="260" y2="330" stroke="#007aff" stroke-width="1.4" marker-end="url(#arrow-blue-en)"/>
  <text x="210" y="318" font-size="9" fill="#007aff">writes</text>

  <!-- Arrow public -> Valkey -->
  <line x1="440" y1="190" x2="360" y2="330" stroke="#666" stroke-width="1.2" marker-end="url(#arrow-en)"/>
  <text x="410" y="268" font-size="9" fill="#6e6e73">reads</text>

  <!-- SQLite -->
  <rect x="30" y="330" width="130" height="56" rx="8" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1"/>
  <text x="95" y="354" text-anchor="middle" font-size="12" font-weight="600" fill="#1d1d1f">SQLite</text>
  <text x="95" y="370" text-anchor="middle" font-size="10" fill="#6e6e73">Config, Settings</text>

  <!-- Arrow admin -> SQLite -->
  <line x1="110" y1="296" x2="100" y2="330" stroke="#007aff" stroke-width="1.4" marker-end="url(#arrow-blue-en)"/>

  <!-- Arrow public -> SQLite (reads) -->
  <line x1="390" y1="190" x2="140" y2="330" stroke="#666" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-en)"/>
  <text x="250" y="240" font-size="9" fill="#6e6e73">reads settings</text>

  <!-- Kuma APIs -->
  <rect x="640" y="160" width="230" height="240" rx="8" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1"/>
  <text x="755" y="184" text-anchor="middle" font-size="11" font-weight="600" fill="#6e6e73">Uptime Kuma Instances</text>

  <rect x="660" y="198" width="190" height="44" rx="6" fill="#fff" stroke="#d2d2d7" stroke-width="1"/>
  <text x="755" y="216" text-anchor="middle" font-size="11" font-weight="500" fill="#1d1d1f">uptime-kuma-api 1</text>
  <text x="755" y="232" text-anchor="middle" font-size="9" fill="#6e6e73">MariaDB 1</text>

  <rect x="660" y="254" width="190" height="44" rx="6" fill="#fff" stroke="#d2d2d7" stroke-width="1"/>
  <text x="755" y="272" text-anchor="middle" font-size="11" font-weight="500" fill="#1d1d1f">uptime-kuma-api 2</text>
  <text x="755" y="288" text-anchor="middle" font-size="9" fill="#6e6e73">MariaDB 2</text>

  <rect x="660" y="310" width="190" height="44" rx="6" fill="#fff" stroke="#d2d2d7" stroke-width="1"/>
  <text x="755" y="328" text-anchor="middle" font-size="11" font-weight="500" fill="#1d1d1f">uptime-kuma-api 3</text>
  <text x="755" y="344" text-anchor="middle" font-size="9" fill="#6e6e73">MariaDB 3</text>

  <!-- Arrows admin -> kuma-apis -->
  <line x1="290" y1="240" x2="660" y2="220" stroke="#007aff" stroke-width="1.4" marker-end="url(#arrow-blue-en)"/>
  <line x1="290" y1="256" x2="660" y2="276" stroke="#007aff" stroke-width="1.4" marker-end="url(#arrow-blue-en)"/>
  <line x1="290" y1="272" x2="660" y2="332" stroke="#007aff" stroke-width="1.4" marker-end="url(#arrow-blue-en)"/>
  <text x="460" y="230" font-size="9" fill="#007aff">HTTP + API Key</text>

  <!-- Browser -->
  <rect x="350" y="440" width="260" height="50" rx="8" fill="#fff" stroke="#d2d2d7" stroke-width="1"/>
  <text x="480" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#1d1d1f">Browser</text>
  <text x="480" y="478" text-anchor="middle" font-size="10" fill="#6e6e73">WebSocket + HTTP Poll (10s)</text>

  <!-- Arrow browser -> public -->
  <line x1="480" y1="440" x2="480" y2="400" stroke="#666" stroke-width="1.2" marker-end="url(#arrow-en)"/>
  <text x="490" y="424" font-size="9" fill="#6e6e73">via NPM</text>

  <!-- Legend -->
  <line x1="40" y1="500" x2="70" y2="500" stroke="#007aff" stroke-width="1.4"/>
  <text x="76" y="504" font-size="9" fill="#6e6e73">write path</text>
  <line x1="150" y1="500" x2="180" y2="500" stroke="#666" stroke-width="1.2"/>
  <text x="186" y="504" font-size="9" fill="#6e6e73">read path</text>
  <line x1="260" y1="500" x2="290" y2="500" stroke="#666" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="296" y="504" font-size="9" fill="#6e6e73">read (SQLite direct)</text>
</svg>
